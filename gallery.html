  <style>
    :root {

    .item img, .item video, .item iframe { width: 100%; height: 200px; object-fit: cover; display: block; border: none; cursor: pointer; }

    /* Lightbox */
    #lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
    #lightbox img { max-width: 90%; max-height: 80%; border: 2px solid var(--gold); }
    #lightbox .close { position: absolute; top: 30px; right: 40px; font-size: 40px; color: white; cursor: pointer; }

    @media (max-width: 900px) {

      .vertical-line { height: 1px; width: 100%; margin: 30px 0; }
    }

<div class="gallery-section">
    <h1 class="gallery-title">Prime Book Media Gallery</h1>

    <div class="split-wrapper">
        <section class="column">
            <h2>Flyers/Posters</h2>
            <div id="image-grid" class="content-grid"></div>
        </section>

        <div class="vertical-line"></div>

        </section>

<div id="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img" src="">
</div>

<script>
    const username = "primebookgith";
    const repo = "newebsites";
    const folder = "gallery";
    const youtubeVideos = ["mJiGTZm8yR4", "dsYBmmj68kE", "9AqbQMvim3Y", "zjj9n-CLywM", "qwIzSsbIl3Q"]; 

    const imgGrid = document.getElementById('image-grid');
    const vidGrid = document.getElementById('video-grid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    async function loadGallery() {
        // 1. Load YouTube Videos into Video Column
        youtubeVideos.forEach(id => {
            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
            vidGrid.appendChild(item);
        });

        // 2. Fetch from GitHub
        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`);
            const files = await response.json();

            files.forEach(file => {
                const item = document.createElement('div');
                item.className = 'item';

                if (file.name.match(/\.(jpe?g|png|gif|webp)$/i)) {
                    item.innerHTML = `<img src="${file.download_url}" alt="Gallery Image">`;
                    item.onclick = () => {
                        lightbox.style.display = 'flex';
                        lightboxImg.src = file.download_url;
                    };
                    imgGrid.appendChild(item);
                } 
                else if (file.name.match(/\.(mp4|webm|ogg)$/i)) {
                    item.innerHTML = `<video controls><source src="${file.download_url}" type="video/mp4"></video>`;
                    vidGrid.appendChild(item);
                }
            });
        } catch (e) { console.error("Could not fetch media", e); }
    }

    // Close Lightbox
    document.querySelector('.close').onclick = () => lightbox.style.display = 'none';
    lightbox.onclick = (e) => { if(e.target !== lightboxImg) lightbox.style.display = 'none'; };

    loadGallery();
</script>

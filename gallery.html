    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            grid-gap: 15px;
        }

        .item { cursor: pointer; border-radius: 8px; overflow: hidden; transition: transform 0.3s; }
        .item:hover { transform: scale(1.03); }
        
        .item img, .item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        /* --- LIGHTBOX CSS --- */
        #lightbox {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 80%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #lightbox .close {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 40px; color: white;
            cursor: pointer;
        }
    </style>
</head>

    <h1>My Media Gallery</h1>

    <div class="container">
        <div class="gallery">
            <div class="item"><img src="images/uae_tax_stress.jpg" alt="Photo 1"></div>
            <div class="item"><img src="images/The_Hidden_Risks_Self_Filing.jpg" alt="Photo 2"></div>
            <div class="item">
                <video controls><source src="your-video.mp4" type="video/mp4"></video>
            </div>
        </div>
    </div>

    <div id="lightbox">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.querySelector('.close');

        // Open lightbox when an image is clicked
        document.querySelectorAll('.item img').forEach(image => {
            image.onclick = () => {
                lightbox.style.display = 'flex';
                lightboxImg.src = image.src;
            };
        });

        // Close lightbox
        closeBtn.onclick = () => { lightbox.style.display = 'none'; };
        lightbox.onclick = (e) => { if(e.target !== lightboxImg) lightbox.style.display = 'none'; };
    </script>
